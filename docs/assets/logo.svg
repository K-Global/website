<?xml version="1.0" encoding="UTF-8"?>
<!--
  PLACEHOLDER wordmark logo for the site header.
  Generated as a text/SVG stand-in until a real K Global logo asset is supplied.
  Designed to sit on the navy header bar (renders light). Legally distinct:
  no real-world airline mark reproduced.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" role="img" aria-label="K Global">
  <g fill="none" stroke="#D4A24C" stroke-width="2.2">
    <circle cx="20" cy="20" r="14"/>
    <ellipse cx="20" cy="20" rx="6" ry="14"/>
    <line x1="6" y1="20" x2="34" y2="20"/>
  </g>
  <text x="44" y="27" font-family="Inter, Arial, sans-serif" font-size="20"
        font-weight="800" letter-spacing="0.5" fill="#FFFFFF">K</text>
  <text x="60" y="27" font-family="Inter, Arial, sans-serif" font-size="20"
        font-weight="400" letter-spacing="3" fill="#FFFFFF">GLOBAL</text>
</svg>
