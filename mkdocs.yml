site_name: K Global
site_description: >-
  K Global — go further, together. A community-driven virtual airline on
  VATSIM, dispatched through VAMSYS: a premium place to fly, learn and belong,
  with nine business units growing from a Frankfurt core.
site_author: K Global
# Custom domain (see docs/CNAME). Keep in sync with the Pages custom domain.
site_url: https://kglobalair.com/

# Fail the build on broken internal links / nav — enforced in CI too.
strict: true

# Internal notes that ship in the repo but are not site pages.
exclude_docs: |
  assets/README.md

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: B612 Mono
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search
  - glightbox

nav:
  - Home: index.md
  - About: about.md
  - Network:
      - Overview: network/index.md
      - The ten hubs: network/hubs.md
  - Business Units: business-units/index.md
  - Fleet: fleet/index.md
  - Flying Here: flying/index.md
  - Join: join.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/K-Global
      name: K Global on GitHub
  generator: false

copyright: >-
  K Global is a fictional virtual airline for flight-simulation use on VATSIM.
  Not affiliated with any real-world carrier.
